table:
  columns:
    - key: name
      label: 名称
      editable: true
    - key: type
      label: 类型
      editable: false
    - key: description
      label: 描述
      editable: true
  rows: []

chart_bar:
  chartType: bar
  option:
    tooltip: {}
    xAxis:
      type: category
      data: []
    yAxis:
      type: value
    series:
      - type: bar
        data: []

chart_pie:
  chartType: pie
  option:
    tooltip: {}
    series:
      - type: pie
        radius: "50%"
        data: []

chart_line:
  chartType: line
  option:
    tooltip: {}
    xAxis:
      type: category
      data: []
    yAxis:
      type: value
    series:
      - type: line
        data: []

mermaid_flowchart:
  code: |
    graph TD
      A[开始] --> B{判断}
      B -->|是| C[执行]
      B -->|否| D[跳过]

mermaid_sequence:
  code: |
    sequenceDiagram
      participant U as 用户
      participant A as Agent
      participant S as Skill
      U->>A: 请求
      A->>S: 激活技能
      S-->>A: 返回结果
      A-->>U: 展示输出

suggestion:
  title: 请选择
  options:
    - id: option_a
      label: 选项 A
      description: 描述 A
    - id: option_b
      label: 选项 B
      description: 描述 B
