# 角色卡模板

```yaml
name: ""
type: character
description: ""
properties:
  性格: ""          # 3-5个关键词
  背景: ""          # 简要背景故事
  目标: ""          # 核心动机
  弱点: ""          # 性格缺陷
  说话方式: ""      # 口癖/语气特征
  外貌: ""          # 视觉描述
```

# 区域卡模板

```yaml
