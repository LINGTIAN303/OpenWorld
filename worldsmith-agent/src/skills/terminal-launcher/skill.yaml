id: terminal-launcher
name: 终端启动器
icon: "🚀"
description: 智能终端启动器，自动识别 Tauri 桌面模式或 Web 应用模式，按正确模式调用终端能力。支持 Shell 类型选择和环境变量注入。关键词：终端、terminal、启动终端、打开终端、执行命令、模式检测。
enabled: true
baseTools: []
allowedTools:
  - detect_terminal_mode
  - start_server
  - launch_terminal
  - launch_terminal_script
  - detect_shells
  - shell_session_create
  - shell_session_exec
  - shell_session_input
  - shell_session_destroy
  - shell_session_list
