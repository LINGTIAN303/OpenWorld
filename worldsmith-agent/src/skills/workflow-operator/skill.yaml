id: workflow-operator
name: 工作流操作
icon: "⚡"
description: 工作流编排与执行。创建、编辑、运行、监控、导入/导出工作流。在 WorldSmith 重构后的 Tauri Command + 节点图架构下工作，支持 14 个 builtin 节点类型 + plugin 注入节点、agent_decision 决策点、循环/并行/子流程等控制流。关键词：工作流、流程、流水线、编排、自动化、节点图。
enabled: true
baseTools: []
allowedTools:
  # 定义 CRUD
  - workflow_list
  - workflow_get
  - workflow_create
  - workflow_update
  - workflow_delete
  - workflow_export
  - workflow_import
  # 校验
  - workflow_dry_run
  # 运行控制
  - workflow_run
  - workflow_run_sync
  - workflow_status
  - workflow_list_runs
  - workflow_get_run
  - workflow_cancel
  - workflow_pause
  - workflow_resume
  # 节点元数据
  - workflow_list_node_types
  - workflow_get_node_schema
